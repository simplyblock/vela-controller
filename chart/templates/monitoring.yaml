---
apiVersion: v1
kind: Secret
metadata:
  name: vela-grafana-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  VELA_GRAFANA_SECURITY_ADMIN_USER: "{{ .Values.monitoring.VELA_GRAFANA_SECURITY_ADMIN_USER }}"
  VELA_GRAFANA_SECURITY_ADMIN_PASSWORD: "{{ .Values.monitoring.VELA_GRAFANA_SECURITY_ADMIN_PASSWORD }}"

---
apiVersion: v1
kind: Secret
metadata:
  name: vela-grafana-db-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  GF_DATABASE_USER: "{{ .Values.monitoring.grafanaDatabase.user }}"
  GF_DATABASE_PASSWORD: "{{ .Values.monitoring.grafanaDatabase.password }}"
  GF_DATABASE_NAME: "{{ .Values.monitoring.grafanaDatabase.name }}"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vela-grafana-datasource
  labels:
    app: vela-grafana
  namespace: {{ .Release.Namespace }}
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://{{ .Values.prometheus.name }}.{{ .Values.prometheus.namespace }}.svc.cluster.local:9090
      isDefault: true
      access: proxy
      uid: PBFA97CFB590B2093
      editable: true 

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vela-grafana-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    app: vela-grafana
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: simplyblock-csi-sc
  resources:
    requests:
      storage: 10Gi     
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vela-grafana
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vela-grafana
  template:
    metadata:
      labels:
        app: vela-grafana
    spec:      
      securityContext:
        fsGroup: 472
        supplementalGroups:
          - 0
      initContainers:
{{ include "vela.waitForPostgresInitContainer" (dict "host" .Values.monitoring.grafanaDatabase.host "port" .Values.monitoring.grafanaDatabase.port) | nindent 8 }}
        - name: configure-grafana-db
          image: postgres:17-alpine
          env:
            - name: DB_HOST
              value: "{{ .Values.monitoring.grafanaDatabase.host }}"
            - name: DB_PORT
              value: "{{ .Values.monitoring.grafanaDatabase.port | quote }}"
            - name: DB_SUPERUSER
              valueFrom:
                secretKeyRef:
                  name: database
                  key: superuser-username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: database
                  key: superuser-password
            - name: GRAFANA_DB_USER
              valueFrom:
                secretKeyRef:
                  name: vela-grafana-db-secret
                  key: GF_DATABASE_USER
            - name: GRAFANA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vela-grafana-db-secret
                  key: GF_DATABASE_PASSWORD
            - name: GRAFANA_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: vela-grafana-db-secret
                  key: GF_DATABASE_NAME
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              PSQL="psql -h \"$DB_HOST\" -p \"$DB_PORT\" -U \"$DB_SUPERUSER\" -d postgres -v ON_ERROR_STOP=1"

              $PSQL -tc "SELECT 1 FROM pg_roles WHERE rolname='${GRAFANA_DB_USER}'" | grep -q 1 || \
                $PSQL -c "CREATE ROLE ${GRAFANA_DB_USER} LOGIN PASSWORD '${GRAFANA_DB_PASSWORD}'"

              $PSQL -tc "SELECT 1 FROM pg_database WHERE datname='${GRAFANA_DB_NAME}'" | grep -q 1 || \
                $PSQL -c "CREATE DATABASE ${GRAFANA_DB_NAME} OWNER ${GRAFANA_DB_USER}"

              $PSQL -c "ALTER DATABASE ${GRAFANA_DB_NAME} OWNER TO ${GRAFANA_DB_USER}"
      containers:
        - name: grafana
          image: grafana/grafana:12.2.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: vela-grafana-secret
                  key: VELA_GRAFANA_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vela-grafana-secret
                  key: VELA_GRAFANA_SECURITY_ADMIN_PASSWORD
            - name: GF_ALERTING_ENABLED
              value: "true"
            - name: GF_PATHS_PROVISIONING
              value: "/etc/grafana/provisioning"
            - name: GF_AUTH_JWT_URL_LOGIN
              value: "true"
            - name: GF_SERVER_ROOT_URL
              value: "https://{{ .Values.domain }}:{{ .Values.port }}/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_AUTH_JWT_ENABLED
              value: "true"
            - name: "GF_AUTH_JWT_HEADER_NAME"
              value: "Authorization"
            - name: "GF_AUTH_JWT_USERNAME_CLAIM" 
              value: "sub"
            - name: "GF_AUTH_JWT_EMAIL_CLAIM"
              value: "email"
            - name: "GF_AUTH_JWT_AUTO_SIGN_UP" 
              value: "true"
            - name: "GF_USERS_ALLOW_SIGN_UP"
              value: "false"
            - name: "GF_AUTH_JWT_JWK_SET_URL" 
              value: "https://{{ .Values.domain }}:{{ .Values.port }}/auth/realms/vela/protocol/openid-connect/certs"
            - name: GF_DATABASE_TYPE
              value: "postgres"
            - name: GF_DATABASE_HOST
              value: "{{ printf \"%s:%v\" .Values.monitoring.grafanaDatabase.host .Values.monitoring.grafanaDatabase.port }}"
            - name: GF_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: vela-grafana-db-secret
                  key: GF_DATABASE_NAME
            - name: GF_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: vela-grafana-db-secret
                  key: GF_DATABASE_USER
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vela-grafana-db-secret
                  key: GF_DATABASE_PASSWORD
            - name: GF_DATABASE_SSL_MODE
              value: "{{ .Values.monitoring.grafanaDatabase.sslMode }}"
          volumeMounts:
            - name: datasource-config
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasource-config
          configMap:
            name: vela-grafana-datasource
        - name: grafana-data
          persistentVolumeClaim:
            claimName: vela-grafana-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: vela-grafana
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: vela-grafana
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vela-grafana
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - "{{ .Values.domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: vela-grafana
          namespace: {{ .Release.Namespace }}
          port: 3000
